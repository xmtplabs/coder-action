name: Coder Agent

on:
  issues:
    types: [assigned, closed]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  workflow_run:
    # List the exact names of CI workflows to monitor.
    # These must match the `name:` field in each workflow file.
    workflows: ["CI", "Tests", "Lint"]
    types: [completed]

permissions:
  actions: read
  issues: write
  pull-requests: write
  contents: read

jobs:
  # ─── Task Creation ─────────────────────────────────────────────
  # Triggered when an issue is assigned to the coder agent
  create-task:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'issues'
      && github.event.action == 'assigned'
      && github.event.assignee.login == 'xmtp-coder-agent'
    steps:
      - name: Create Coder Task
        uses: xmtplabs/coder-action@v0
        with:
          action: create_task
          coder-url: ${{ secrets.CODER_URL }}
          coder-token: ${{ secrets.CODER_TOKEN }}
          github-token: ${{ github.token }}
          prompt: |
            You are an autonomous AI agent. Resolve the GitHub issue below.
            Read the issue, develop a plan, post it as a comment, then implement and open a PR.

  # ─── Task Cleanup ───────────────────────────────────────────────
  # Triggered when an issue is closed — stops and deletes the Coder task
  close-task:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'issues'
      && github.event.action == 'closed'
    steps:
      - name: Close Coder Task
        uses: xmtplabs/coder-action@v0
        with:
          action: close_task
          coder-url: ${{ secrets.CODER_URL }}
          coder-token: ${{ secrets.CODER_TOKEN }}
          github-token: ${{ github.token }}

  # ─── PR Comment Forwarding ─────────────────────────────────────
  # Triggered when someone comments on a PR authored by the coder agent
  pr-comment:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'issue_comment'
      && github.event.action == 'created'
      && github.event.issue.pull_request
      && github.event.issue.user.login == 'xmtp-coder-agent'
      && github.event.comment.user.login != 'xmtp-coder-agent'
    steps:
      - name: Forward PR Comment to Coder Task
        uses: xmtplabs/coder-action@v0
        with:
          action: pr_comment
          coder-url: ${{ secrets.CODER_URL }}
          coder-token: ${{ secrets.CODER_TOKEN }}
          github-token: ${{ github.token }}

  # ─── PR Review Comment Forwarding ─────────────────────────────
  # Triggered when someone leaves an inline review comment on a PR authored by the coder agent
  pr-review-comment:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request_review_comment'
      && github.event.action == 'created'
      && github.event.pull_request.user.login == 'xmtp-coder-agent'
      && github.event.comment.user.login != 'xmtp-coder-agent'
    steps:
      - name: Forward PR Review Comment to Coder Task
        uses: xmtplabs/coder-action@v0
        with:
          action: pr_comment
          coder-url: ${{ secrets.CODER_URL }}
          coder-token: ${{ secrets.CODER_TOKEN }}
          github-token: ${{ github.token }}

  # ─── PR Review Forwarding ──────────────────────────────────────
  # Triggered when someone submits a review (approve/request changes/comment) on a PR authored by the coder agent
  pr-review:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request_review'
      && github.event.action == 'submitted'
      && github.event.pull_request.user.login == 'xmtp-coder-agent'
      && github.event.review.user.login != 'xmtp-coder-agent'
      && github.event.review.body != ''
    steps:
      - name: Forward PR Review to Coder Task
        uses: xmtplabs/coder-action@v0
        with:
          action: pr_comment
          coder-url: ${{ secrets.CODER_URL }}
          coder-token: ${{ secrets.CODER_TOKEN }}
          github-token: ${{ github.token }}

  # ─── Issue Comment Forwarding ──────────────────────────────────
  # Triggered when someone comments on an issue (not a PR)
  issue-comment:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'issue_comment'
      && github.event.action == 'created'
      && !github.event.issue.pull_request
      && github.event.comment.user.login != 'xmtp-coder-agent'
    steps:
      - name: Forward Issue Comment to Coder Task
        uses: xmtplabs/coder-action@v0
        with:
          action: issue_comment
          coder-url: ${{ secrets.CODER_URL }}
          coder-token: ${{ secrets.CODER_TOKEN }}
          github-token: ${{ github.token }}

  # ─── Failed Check Forwarding ────────────────────────────────────
  # Triggered when a monitored CI workflow fails
  failed-check:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Forward Failed Check to Coder Task
        uses: xmtplabs/coder-action@v0
        with:
          action: failed_check
          coder-url: ${{ secrets.CODER_URL }}
          coder-token: ${{ secrets.CODER_TOKEN }}
          github-token: ${{ github.token }}
