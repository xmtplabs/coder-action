"$schema" = "./node_modules/wrangler/config-schema.json"
name = "task-action"
main = "src/main.ts"
compatibility_date = "2026-04-18"
compatibility_flags = ["nodejs_compat"]

[[workflows]]
name = "task-runner-workflow"
binding = "TASK_RUNNER_WORKFLOW"
class_name = "TaskRunnerWorkflow"

[[workflows]]
name = "repo-config-workflow"
binding = "REPO_CONFIG_WORKFLOW"
class_name = "RepoConfigWorkflow"

[[durable_objects.bindings]]
name = "REPO_CONFIG_DO"
class_name = "RepoConfigDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RepoConfigDO"]

[limits]
cpu_ms = 30000

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true

[observability.traces]
enabled = true
head_sampling_rate = 1

[vars]
AGENT_GITHUB_USERNAME = "xmtp-coder-agent"
CODER_URL = "https://sandbox.xmtp.team"
CODER_TASK_NAME_PREFIX = "gh"
CODER_TEMPLATE_NAME = "task-template"
CODER_TEMPLATE_NAME_CODEX = "task-template-codex"
CODER_ORGANIZATION = "default"
LOG_FORMAT = "json"
